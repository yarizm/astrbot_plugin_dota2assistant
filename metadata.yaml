name: astrbot_plugin_dota2assistant
desc: Dota2 助手插件，查询玩家战绩、英雄数据、物品信息、比赛详情、实时比赛和职业赛事。
short_desc: Dota2 助手插件，查询玩家战绩、英雄数据、物品信息、比赛详情、实时比赛和职业赛事。
version: 0.1.0
author: YARIZM
support_platforms:
  - aiocqhttp
  - qq_official
  - qq_official_webhook
  - telegram
  - discord
  - wecom
  - lark
  - dingtalk
  - kook
  - satori
  - webchat
astrbot_version: ">=4.16,<5"
requirements:
  - aiohttp
config:
  default_language:
    description: 英雄/物品名称默认语言
    type: string
    default: "cn"
  enable_fallback_commands:
    description: 是否启用 /dota 命令
    type: boolean
    default: true
  request_timeout:
    description: API 请求超时（秒）
    type: integer
    default: 15
  cache_ttl_seconds:
    description: 数据缓存时间（秒）
    type: integer
    default: 86400
  steam_api_key:
    description: Steam API Key（可选，用于获取比赛数据，申请地址：https://steamcommunity.com/dev/apikey）
    type: string
    default: ""
